services:
  # BUILDER: produces the deployable application image; never runs.
  na-sso-builder:
    profiles: ["build"]
    build:
      context: .
    image: na-sso:local

  # PRODUCTION RUNTIME: consumes the built image and only normal configuration.
  na-sso:
    image: na-sso:local
    restart: unless-stopped
    env_file: .config/.env
    environment:
      NA_SSO_CONFIG_FILE: /config/na-sso.yaml
    ports:
      - "8000:8000"
    volumes:
      - na-sso-data:/data
      - ./.config/na-sso.yaml:/config/na-sso.yaml:ro

volumes:
  na-sso-data:
