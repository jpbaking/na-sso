services:
  # BUILDER: produces the deployable application image; never runs.
  oneauth-builder:
    profiles: ["build"]
    build:
      context: .
    image: oneauth:local

  # PRODUCTION RUNTIME: consumes the built image and only normal configuration.
  oneauth:
    image: oneauth:local
    restart: unless-stopped
    env_file: .config/.env
    environment:
      ONEAUTH_CONFIG_FILE: /config/oneauth.yaml
    ports:
      - "8000:8000"
    volumes:
      - oneauth-data:/data
      - ./.config/oneauth.yaml:/config/oneauth.yaml:ro

volumes:
  oneauth-data:
